<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ระบบตารางข้อมูล</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 p-6 sm:p-12">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">📊 ระบบบันทึกข้อมูลตาราง (Cloud Storage)</h2>
        
        <form id="dataForm" class="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-8">
            <input type="text" id="name" placeholder="ชื่อ-นามสกุล" required class="border p-2 rounded focus:outline-blue-500">
            <input type="text" id="position" placeholder="ตำแหน่ง" required class="border p-2 rounded focus:outline-blue-500">
            <input type="number" id="age" placeholder="อายุ" required class="border p-2 rounded focus:outline-blue-500">
            <button type="submit" id="submitBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold p-2 rounded cursor-pointer transition">➕ บันทึกข้อมูล</button>
        </form>

        <div class="overflow-x-auto rounded-lg border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200 text-sm">
                <thead class="bg-gray-800 text-white text-left">
                    <tr>
                        <th class="p-3">ชื่อ-นามสกุล</th>
                        <th class="p-3">ตำแหน่ง</th>
                        <th class="p-3">อายุ</th>
                        <th class="p-3">เวลาที่บันทึก</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200 bg-white">
                    <tr>
                        <td colspan="4" class="p-4 text-center text-gray-500">กำลังโหลดข้อมูล...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // โหลดข้อมูลทันทีเมื่อเปิดหน้าเว็บ
        window.onload = function() {
            google.script.run.withSuccessHandler(renderTable).getCloudData();
        };

        // ฟังก์ชันอัปเดตตาราง
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-400">ยังไม่มีข้อมูลในระบบ</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(row => `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 font-medium text-gray-900">${row[0]}</td>
                    <td class="p-3 text-gray-700">${row[1]}</td>
                    <td class="p-3 text-gray-700">${row[2]}</td>
                    <td class="p-3 text-gray-500">${row[3] || '-'}</td>
                </tr>
            `).join('');
        }

        // เมื่อกดปุ่มส่งฟอร์ม
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ กำลังบันทึก...";
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const position = document.getElementById('position').value;
            const age = document.getElementById('age').value;

            // ส่งข้อมูลไปบันทึกที่ Google Sheet หลังบ้าน
            google.script.run.withSuccessHandler(function(updatedData) {
                renderTable(updatedData);
                document.getElementById('dataForm').reset();
                btn.innerText = "➕ บันทึกข้อมูล";
                btn.disabled = false;
            }).saveData(name, position, age);
        });
    </script>
</body>
</html>
