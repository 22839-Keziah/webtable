<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลรูปแบบตาราง</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-6">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-gray-850 mb-6 text-center">📊 ระบบเก็บข้อมูลรูปแบบตาราง</h1>

        <form id="dataForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-gray-50 p-4 rounded-md">
            <input type="hidden" id="editIndex">
            <div>
                <label class="block text-sm font-medium text-gray-700">ชื่อ-นามสกุล</label>
                <input type="text" id="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">อีเมล</label>
                <input type="email" id="email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">เบอร์โทรศัพท์</label>
                <input type="tel" id="phone" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="flex items-end">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200">
                    ➕ เพิ่มข้อมูล
                </button>
            </div>
        </form>

        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 border">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ลำดับ</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ชื่อ-นามสกุล</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">อีเมล</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">เบอร์โทรศัพท์</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // ดึงข้อมูลจาก LocalStorage หรือตั้งเป็นอาร์เรย์ว่างถ้าไม่มีข้อมูล
        let dataList = JSON.parse(localStorage.getItem('tableData')) || [];

        const dataForm = document.getElementById('dataForm');
        const tableBody = document.getElementById('tableBody');
        const submitBtn = document.getElementById('submitBtn');
        const editIndexInput = document.getElementById('editIndex');

        // ฟังก์ชันแสดงผลข้อมูลในตาราง
        function renderTable() {
            tableBody.innerHTML = '';
            
            if (dataList.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">ไม่มีข้อมูลในระบบ</td></tr>`;
                return;
            }

            dataList.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${index + 1}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${item.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.email}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.phone}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-center space-x-2">
                        <button onclick="editData(${index})" class="text-indigo-600 hover:text-indigo-900 bg-indigo-50 px-3 py-1 rounded">แก้ไข</button>
                        <button onclick="deleteData(${index})" class="text-red-600 hover:text-red-900 bg-red-50 px-3 py-1 rounded">ลบ</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            // บันทึกลง LocalStorage ทุกครั้งที่มีการเปลี่ยนแปลง
            localStorage.setItem('tableData', JSON.stringify(dataList));
        }

        // ฟังก์ชันเมื่อกดปุ่มบันทึก (ทั้งเพิ่มและแก้ไข)
        dataForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const editIndex = editIndexInput.value;

            const newData = { name, email, phone };

            if (editIndex === "") {
                // โหมดเพิ่มข้อมูลใหม่
                dataList.push(newData);
            } else {
                // โหมดแก้ไขข้อมูลเดิม
                dataList[editIndex] = newData;
                submitBtn.innerText = "➕ เพิ่มข้อมูล";
                submitBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200";
                editIndexInput.value = "";
            }

            dataForm.reset();
            renderTable();
        });

        // ฟังก์ชันดึงข้อมูลมาเตรียมแก้ไข
        function editData(index) {
            const item = dataList[index];
            document.getElementById('name').value = item.name;
            document.getElementById('email').value = item.email;
            document.getElementById('phone').value = item.phone;
            editIndexInput.value = index;

            submitBtn.innerText = "💾 อัปเดตข้อมูล";
            submitBtn.className = "w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md transition duration-200";
        }

        // ฟังก์ชันลบข้อมูล
        function deleteData(index) {
            if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลนี้?')) {
                dataList.splice(index, 1);
                renderTable();
            }
        }

        // เรียกใช้งานครั้งแรกตอนโหลดหน้าเว็บ
        renderTable();
    </script>
</body>
</html>
