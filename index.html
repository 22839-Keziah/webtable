<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลตาราง</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-6">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
            📊 ระบบเก็บข้อมูลรูปแบบตาราง
        </h1>

        <form id="dataForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 items-end">
            <input type="hidden" id="editIndex">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล</label>
                <input type="text" id="nameInput" required class="w-full p-2 border rounded border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                <input type="tel" id="phoneInput" required class="w-full p-2 border rounded border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                <input type="email" id="emailInput" required class="w-full p-2 border rounded border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2 rounded transition shadow">
                ➕ เพิ่มข้อมูล
            </button>
        </form>

        <div class="overflow-x-auto">
            <table class="min-w-full bg-white border border-gray-200 rounded-lg overflow-hidden">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="py-3 px-4 text-left text-sm font-semibold">ลำดับ</th>
                        <th class="py-3 px-4 text-left text-sm font-semibold">ชื่อ-นามสกุล</th>
                        <th class="py-3 px-4 text-left text-sm font-semibold">เบอร์โทรศัพท์</th>
                        <th class="py-3 px-4 text-left text-sm font-semibold">อีเมล</th>
                        <th class="py-3 px-4 text-center text-sm font-semibold">จัดการข้อมูล</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200">
